<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X Clone — Home</title>

  <link rel="stylesheet" href="CSS/base.css" />
  <link rel="stylesheet" href="CSS/layout.css" />
  <link rel="stylesheet" href="CSS/sidebar.css" />
  <link rel="stylesheet" href="CSS/feed.css" />
  <link rel="stylesheet" href="CSS/post.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">𝕏</div>
      <nav class="nav">
        <button class="nav-item active">Home</button>
        <button class="nav-item">Explore</button>
        <button class="nav-item">Notifications</button>
        <button class="nav-item">Messages</button>
        <button class="nav-item">Grok</button>
        <button class="nav-item">Communities</button>
        <button class="nav-item">Premium</button>
        <button class="nav-item">Profile</button>
      </nav>

      <button class="post-btn" id="primary-post">Post</button>

      <div class="profile-chip">
        <div class="avatar small">A</div>
        <div>
          <strong>Aviral</strong>
          <p>@avrbt</p>
        </div>
      </div>
    </aside>

    <main class="feed">
      <header class="feed-header">
        <h1>Home</h1>
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode">◐</button>
      </header>

      <div class="tabs">
        <button class="tab active" data-tab="for-you">For you</button>
        <button class="tab" data-tab="following">Following</button>
      </div>

      <section class="composer" id="composer">
        <div class="avatar">A</div>

        <div class="composer-content">
          <textarea id="post-text" maxlength="280" placeholder="What is happening?!"></textarea>

          <div class="composer-row">
            <input id="media-url" type="url" placeholder="Optional image URL" />
          </div>

          <div class="composer-actions">
            <span id="char-count">280</span>
            <button id="create-post">Post</button>
          </div>
        </div>
      </section>

      <section id="timeline" aria-live="polite"></section>
    </main>

    <aside class="widgets">
      <div class="search-wrap">
        <input id="search" type="search" placeholder="Search" />
      </div>

      <section class="widget-card">
        <h3>Subscribe to Premium</h3>
        <p>Unlock ad-reduced timelines, longer posts, and creator tools.</p>
        <button class="pill">Subscribe</button>
      </section>

      <section class="widget-card">
        <h3>Trends for you</h3>
        <ul id="trends-list"></ul>
      </section>

      <section class="widget-card">
        <h3>Who to follow</h3>
        <ul class="follow-list">
          <li><span>@openweb</span><button class="pill">Follow</button></li>
          <li><span>@productbuild</span><button class="pill">Follow</button></li>
          <li><span>@frontendops</span><button class="pill">Follow</button></li>
        </ul>
      </section>
    </aside>
  </div>

  <script src="JS/main.js"></script>
</body>
</html>
